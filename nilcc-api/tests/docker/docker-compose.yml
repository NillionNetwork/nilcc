services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "35432:5432"

  localstack:
    image: localstack/localstack:4.14.0
    ports:
      - "14566:4566"

  anvil:
    image: ghcr.io/nillionnetwork/nil-anvil:d0788f3
    ports:
      - "38545:8545"

  agent:
    image: caddy:2
    ports:
      - "35435:80"
    command: |
      caddy respond --listen :80 --body '{}' --header "Content-Type: application/json" 

  artifacts:
    image: caddy:2
    ports:
      - "35436:80"
    command: |
      caddy respond --listen :80 --body '{"built_at": 1758561580}' --header "Content-Type: application/json" 
